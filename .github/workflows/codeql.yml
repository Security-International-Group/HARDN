name: SAST

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  VERSION_COMMIT_SHA: ${{ github.sha }}

permissions:
  contents: read
  actions: read
  packages: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: write
      actions: read
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build_mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql-config.yml
          build-mode: ${{ matrix.build_mode }}
          tools: latest

      - name: Set up Rust toolchain
        if: matrix.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt, clippy

      - name: Install GLib dependencies
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev

      - name: Build Rust project
        if: matrix.language == 'rust'
        run: |
          cargo check
          cargo build --release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: /language:${{ matrix.language }}

  static-analysis:
    name: Static Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: codeql
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        if: matrix.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt, clippy

      - name: Install Rust system dependencies
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Check Rust compilation
        if: matrix.language == 'rust'
        run: cargo check --all-targets --all-features

      - name: Enforce rustfmt
        if: matrix.language == 'rust'
        run: cargo fmt --all -- --check

      - name: Enforce clippy (deny warnings)
        if: matrix.language == 'rust'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run Ruff static analysis
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check .

  supply-chain:
    name: Supply chain (cargo audit + cargo deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Cache scanner binaries
        id: cache-scanners
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-supply-chain-tools-v1

      - name: Install cargo-audit and cargo-deny
        if: steps.cache-scanners.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-audit cargo-deny

      - name: cargo audit (RUSTSEC advisory scan of Cargo.lock)
        run: cargo audit

      - name: cargo deny check (advisories, bans, licenses, sources)
        run: cargo deny check

  shell-lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck against tool scripts
        run: |
          # -S error: only fail on real errors. Style warnings stay informational.
          # Matches the local TAP suite (tests/static/shellcheck.t.sh) exactly
          # so a red CI run reproduces at 'bash tests/static/shellcheck.t.sh'.
          fail=0
          while IFS= read -r script; do
              if ! shellcheck -S error -x "$script"; then
                  fail=1
              fi
          done < <(find usr/share/hardn tests -type f -name '*.sh' | sort)
          exit "$fail"

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      - codeql
      - static-analysis
      - shell-lint
      - supply-chain
    if: always()
    steps:
      - name: Generate Security Report
        run: |
          {
            echo '# Security Scan Results'
            echo
             echo '## Job Status Summary'
                  if [ "${{ needs.codeql.result }}" = "success" ]; then
                    echo "- :one: CodeQL Analysis Passed"
                  else
                    echo "- :one: CodeQL Analysis Failed"
                  fi
                  if [ "${{ needs.static-analysis.result }}" = "success" ]; then
                    echo "- :two: Static Analysis Passed"
                  else
                    echo "- :two: Static Analysis Failed"
                  fi
                  if [ "${{ needs.shell-lint.result }}" = "success" ]; then
                    echo "- :three: Shell Lint Passed"
                  else
                    echo "- :three: Shell Lint Failed"
            fi
            echo
            echo '## Scan Coverage'
            echo '- **Languages**: Rust, Python, Shell'
            echo '- **Tools**: CodeQL, cargo fmt, cargo clippy (-D warnings), Ruff, shellcheck (-S error)'
            echo
            echo '## Next Steps'
            if [ "${{ needs.codeql.result }}" != "success" ] || [ "${{ needs.static-analysis.result }}" != "success" ]; then
              echo 'Some security scans failed. Please review the detailed results above and address any issues.'
            else
              echo 'All security scans passed!'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
