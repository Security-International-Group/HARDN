name: ci

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - name: Legion Harden Runner
        uses: OpenSource-For-Freedom/Legion_runner@v1
        with:
          egress-policy: audit 

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            lintian \
            fakeroot \
            equivs \
            dpkg-dev \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libvte-2.91-gtk4-dev \
            python3-all \
            python3-requests \
            curl \
            sudo \
            whiptail

      - name: Install Rust toolchain
        # No toolchain input: honor rust-toolchain.toml (pinned channel) so
        # the .deb is built with the exact same compiler SAST lints against
        # and the same one developers use locally. Passing 'stable' here let
        # the runner drift to whatever stable is current, which is how a new
        # clippy/rustc release turned main red without any code change.
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Cache cargo registry and git
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install build dependencies from debian/control
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ ! -f debian/control ]; then
            echo "ERROR: debian/control file not found!"
            ls -l debian/ || true
            exit 1
          fi
          sudo mk-build-deps -i debian/control --tool "apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends -y"

      - name: Build Rust binaries
        run: |
          cargo build --release --bins
          # Verify all expected binaries were built
          ls -la target/release/
          test -f target/release/hardn || { echo "hardn binary not found"; exit 1; }
          test -f target/release/hardn-monitor || { echo "hardn-monitor binary not found"; exit 1; }
          test -f target/release/hardn-gui || { echo "hardn-gui binary not found"; exit 1; }

      - name: Prepare baseline directories for tests
        run: |
          sudo mkdir -p /var/lib/hardn/baselines
          sudo chown "$USER":"$USER" /var/lib/hardn /var/lib/hardn/baselines

      - name: Run Rust tests
        run: cargo test --all --all-features --verbose

      - name: Build Debian package with dpkg-buildpackage
        id: deb-build
        run: |
          # Set build options for reproducible builds and parallel processing
          export DEB_BUILD_OPTIONS="parallel=$(nproc) nodwz nocheck"

          # Build the package using dpkg-buildpackage
          dpkg-buildpackage -us -uc -b --no-pre-clean -j"$(nproc)"

          # Find the generated .deb file
          DEB_FILE=$(find .. -name "hardn_*.deb" -type f | head -n1)
          if [ -z "$DEB_FILE" ]; then
            echo "ERROR: No .deb file found after build"
            ls -la ../
            exit 1
          fi

          # Get package info
          VERSION=$(dpkg-deb -f "$DEB_FILE" Version)
          ARCH=$(dpkg-deb -f "$DEB_FILE" Architecture)

          # Create dist directory and copy package and build artifacts
          mkdir -p dist
          DEB_NAME="hardn_${VERSION}_${ARCH}.deb"
          cp "$DEB_FILE" "dist/${DEB_NAME}"

          # Copy build artifacts for upload
          cp ../*.build "dist/" 2>/dev/null || true
          cp ../*.buildinfo "dist/" 2>/dev/null || true
          cp ../*.changes "dist/" 2>/dev/null || true

          echo "Built package: $DEB_NAME"
          echo "Package path: dist/${DEB_NAME}"
          echo "deb_path=dist/${DEB_NAME}" >> "$GITHUB_OUTPUT"
          echo "deb_name=${DEB_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test Debian package with lintian
        run: |
          DEB_FILE="${{ steps.deb-build.outputs.deb_path }}"
          echo "Running lintian checks on $DEB_FILE"
          lintian --display-info --display-experimental --pedantic "$DEB_FILE" || true

      - name: Test package installation in clean environment
        timeout-minutes: 10
        run: |
          DEB_FILE="${{ steps.deb-build.outputs.deb_path }}"

          # Test package info
          echo "=== Package Information ==="
          dpkg-deb -I "$DEB_FILE"

          echo "=== Package Contents ==="
          dpkg-deb -c "$DEB_FILE"

          echo "=== Testing Installation ==="
          # Install the package
          sudo dpkg -i "$DEB_FILE" || true

          # Fix any dependency issues
          sudo apt-get install -f -y

          # Verify installation
          dpkg -l | grep hardn || true

          echo "=== Testing Binary Execution ==="
          # Test that binaries can run (basic smoke test)
          echo "Testing hardn binary..."
          hardn --version || echo "hardn version check failed"
          hardn --help >/dev/null || echo "hardn help failed"

          # Test hardn-monitor with strict timeout to prevent infinite loop
          echo "Testing hardn-monitor (with 3-second timeout)..."
          timeout 3s hardn-monitor 2>/dev/null && echo "hardn-monitor started successfully" || echo "hardn-monitor test completed (expected timeout after service monitoring check)"

          # Test hardn-gui in headless environment (expected to fail gracefully)
          echo "Testing hardn-gui (expected to fail in headless CI)..."
          timeout 3s hardn-gui --version 2>/dev/null || echo "hardn-gui test completed (expected failure in headless environment)"

          # Ensure no background processes are still running
          echo "Cleaning up any remaining processes..."
          pkill -f hardn-monitor || true
          pkill -f hardn-gui || true
          sleep 1

          echo "=== Testing Package Removal ==="
          # Test package removal
          sudo dpkg -r hardn

          echo "Package installation and removal test completed successfully"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: hardn-deb-package
          path: dist/*.deb
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-logs
          path: |
            dist/*.build
            dist/*.buildinfo
            dist/*.changes
          retention-days: 15

  deploy-test:
    name: Deploy and Integration Test
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Download Debian package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hardn-deb-package
          path: release_assets

      - name: Include release imagery assets
        run: |
          mkdir -p release_assets
          cp docs/assets/IMG_1233.jpeg release_assets/IMG_1233.jpeg

      - name: Integration test in fresh container
        timeout-minutes: 8
        run: |
          DEB_FILE=$(ls release_assets/*.deb | head -n1)
          echo "Testing deployment of: $DEB_FILE"

          # Verify package integrity
          dpkg-deb --info "$DEB_FILE"
          dpkg-deb --contents "$DEB_FILE"

          # Install required dependencies first
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-fastapi \
            python3-uvicorn \
            python3-requests \
            python3-psutil \
            adduser \
            curl \
            wget \
            lsof \
            psmisc \
            procps \
            git \
            libvte-2.91-gtk4-0

          # Install the package
          sudo dpkg -i "$DEB_FILE"

          # Verify installation
          echo "=== Verifying Installation ==="
          which hardn
          which hardn-monitor
          which hardn-gui

          # Test basic functionality
          echo "=== Testing Basic Functionality ==="
          hardn --version
          timeout 3s hardn --help >/dev/null || echo "hardn help test completed"

          # Quick test of hardn-monitor (with timeout)
          echo "Quick hardn-monitor validation..."
          timeout 2s hardn-monitor 2>/dev/null || echo "hardn-monitor validation completed"

          # Test systemd service files
          echo "=== Testing Service Integration ==="
          ls -la /lib/systemd/system/hardn*.service || true

          # Test configuration files
          echo "=== Testing Configuration ==="
          ls -la /etc/aide/ || true
          ls -la /usr/share/hardn/ || true

          echo "Integration test completed successfully"

  release:
    name: Create Release
    needs: [build, deploy-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      # Required for sigstore cosign keyless signing: the job mints a
      # short-lived OIDC token that cosign exchanges with Fulcio for a
      # signing certificate. No long-lived key is stored anywhere.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Download Debian package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hardn-deb-package
          path: release_assets

      - name: Install cosign
        # NOTE: pinned to the major version tag, not a commit SHA, unlike
        # the other actions in this repo. The build environment that
        # authored this change cannot reach the sigstore/cosign-installer
        # repository to resolve a SHA. Before relying on this in a release,
        # replace @v3 with the exact '<sha> # v3.x.y' pin to match the
        # repo's supply-chain convention.
        uses: sigstore/cosign-installer@v3

      - name: Ensure tags are present
        run: |
          git fetch --tags --force --prune

      - name: Get version for semantic tagging
        id: version
        run: |
          DEB_FILE=$(ls release_assets/*.deb | head -n1)
          VERSION=$(dpkg-deb -f "$DEB_FILE" Version)
          ARCH=$(dpkg-deb -f "$DEB_FILE" Architecture)
          DEB_NAME=$(basename "$DEB_FILE")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "architecture=$ARCH" >> "$GITHUB_OUTPUT"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"
          echo "Version extracted: $VERSION"
          echo "Architecture: $ARCH"

      - name: Determine next tag
        id: tag
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing semantic tag found; defaulting to 0.0.0"
            LATEST_TAG="0.0.0"
          fi

          PREFIX=""
          VERSION_PART="$LATEST_TAG"
          if [[ "$LATEST_TAG" == v* ]]; then
            PREFIX="v"
            VERSION_PART="${LATEST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_PART"
          if [ -z "$MAJOR" ] || [ -z "$MINOR" ] || [ -z "$PATCH" ]; then
            echo "Unable to parse latest tag: $LATEST_TAG"
            exit 1
          fi

          PATCH=$((10#$PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="${PREFIX}${NEW_VERSION}"

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Calculated next tag: $NEW_TAG (from $LATEST_TAG)"

      - name: Create and push release tag
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists; skipping creation."
          else
            git tag "$NEW_TAG"
            git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Security-International-Group/HARDN.git "$NEW_TAG"
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ steps.version.outputs.architecture }}"
          DEB_NAME="${{ steps.version.outputs.deb_name }}"
          DEB_FILE="release_assets/$DEB_NAME"

          SIZE=$(du -h "$DEB_FILE" | cut -f1)
          SHA256=$(sha256sum "$DEB_FILE" | awk '{print $1}')
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHA="${{ github.sha }}"

          # Extract the latest section from CHANGELOG.md (everything from
          # the first "## [" header to the next one, exclusive). Falls back
          # to a short notice if CHANGELOG.md is missing or unparseable.
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION=$(awk '/^## \[/{if (n++) exit} n' CHANGELOG.md)
          fi
          if [ -z "${CHANGELOG_SECTION:-}" ]; then
            CHANGELOG_SECTION="_See \`CHANGELOG.md\` in the repository for release notes._"
          fi

          {
            echo "![HARDN](docs/assets/IMG_1233.jpeg)"
            echo
            echo "# HARDN $TAG"
            echo
            echo "> Automated release generated on $BUILD_DATE from commit $COMMIT_SHA."
            echo
            echo "$CHANGELOG_SECTION"
            echo
            echo "## Package Details"
            echo
            echo "- **Debian package**: \`$DEB_NAME\`"
            echo "- **Project version**: \`$VERSION\`"
            echo "- **Architecture**: \`$ARCH\`"
            echo "- **Size**: \`$SIZE\`"
            echo "- **SHA256**: \`$SHA256\`"
            echo
            echo "---"
            echo
            echo "Built with dpkg-buildpackage • Validated by integration tests"
          } > RELEASE_NOTES.md
        shell: bash

      - name: Sign package and generate checksums (cosign keyless)
        id: sign
        working-directory: release_assets
        env:
          # Keyless signing: cosign uses the workflow's OIDC identity via
          # Fulcio + Rekor. No key material is read or written.
          COSIGN_YES: "true"
        run: |
          DEB_NAME="${{ steps.version.outputs.deb_name }}"

          # SHA256SUMS over the release artifact so a consumer can verify
          # integrity without cosign too. Only the .deb is downloaded into
          # this job (release_assets), so checksum exactly that; the release
          # imagery is added by a different job and is not present here.
          sha256sum -- *.deb > SHA256SUMS
          cat SHA256SUMS

          # Detached signature + certificate for the .deb. cosign writes
          # the Rekor transparency-log entry as part of sign-blob.
          cosign sign-blob \
            --output-signature "${DEB_NAME}.sig" \
            --output-certificate "${DEB_NAME}.pem" \
            "${DEB_NAME}"

          # Sign the checksum manifest too, so the whole asset set is
          # covered by one verifiable anchor.
          cosign sign-blob \
            --output-signature "SHA256SUMS.sig" \
            --output-certificate "SHA256SUMS.pem" \
            "SHA256SUMS"

          echo "Signed ${DEB_NAME} and SHA256SUMS with cosign (keyless)."

      - name: Append verification instructions to release notes
        run: |
          DEB_NAME="${{ steps.version.outputs.deb_name }}"
          IDENTITY="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main"
          {
            echo
            echo "## Verifying this release"
            echo
            echo "Every asset is signed with [sigstore cosign](https://docs.sigstore.dev/) keyless signing (no long-lived key). Verify the package:"
            echo
            echo '```bash'
            echo "cosign verify-blob \\"
            echo "  --certificate ${DEB_NAME}.pem \\"
            echo "  --signature ${DEB_NAME}.sig \\"
            echo "  --certificate-identity '${IDENTITY}' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ${DEB_NAME}"
            echo '```'
            echo
            echo "Or check integrity only:"
            echo
            echo '```bash'
            echo "sha256sum -c SHA256SUMS"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          name: HARDN ${{ steps.tag.outputs.new_tag }}
          body_path: RELEASE_NOTES.md
          files: |
            release_assets/*.deb
            release_assets/IMG_1233.jpeg
            release_assets/SHA256SUMS
            release_assets/SHA256SUMS.sig
            release_assets/SHA256SUMS.pem
            release_assets/*.deb.sig
            release_assets/*.deb.pem
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Discord notification
        if: always()
        shell: bash
        env:
          WEBHOOK: ${{ secrets.DEV_UPDATES_DISCORD_WEBHOOK }}
        run: |
          # Skip if webhook missing/placeholder
          if [[ -z "${WEBHOOK:-}" || "${WEBHOOK}" == "***" || "${WEBHOOK}" == "*****" ]]; then
            echo "Discord webhook not configured; skipping notification."; exit 0; fi

          STATUS="${{ job.status }}"
          VERSION="${{ steps.version.outputs.version }}"
          DEB_NAME="${{ steps.version.outputs.deb_name }}"
          PREV_TAG="${{ steps.tag.outputs.latest_tag }}"
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${NEW_TAG}"
          COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_TAG}"

          COLOR=15105570
          [[ "$STATUS" == "success" ]] && COLOR=3066993 || true
          [[ "$STATUS" == "failure" ]] && COLOR=15158332 || true

          # Build short changelog from commits since previous tag (max 10 lines).
          # Skip merge commits; trim each subject to 100 chars to keep the embed tidy.
          CHANGES=""
          if [[ -n "$PREV_TAG" ]] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:'%s' \
              | head -n 10 \
              | awk '{ if (length($0) > 100) print "- " substr($0,1,97) "..."; else print "- " $0 }')
          fi
          [[ -z "$CHANGES" ]] && CHANGES="- (no commits since ${PREV_TAG:-previous release})"

          TITLE="HARDN Release ${NEW_TAG}"
          DESCRIPTION=$(printf 'Status: **%s** — `%s`\n\n**Changes since %s:**\n%s\n\n[Full changelog](%s)' \
            "$STATUS" "$DEB_NAME" "${PREV_TAG:-initial}" "$CHANGES" "$COMPARE_URL")

          # Build payload with jq so commit subjects are escaped safely.
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg url "$RELEASE_URL" \
            --argjson color "$COLOR" \
            '{embeds:[{title:$title, description:$description, color:$color, url:$url}]}')

          curl -H "Content-Type: application/json" -X POST "$WEBHOOK" \
            -d "$PAYLOAD" || true
