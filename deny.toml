# cargo-deny configuration for HARDN.
#
# Run locally with:  cargo deny check
# CI runs the same command in the supply-chain job (.github/workflows/codeql.yml).
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
all-features = true

[advisories]
# Fail the build on any crate with a known RUSTSEC vulnerability.
# Unmaintained crates warn rather than fail so a dependency going
# quiet upstream does not block unrelated work; the warning is
# visible in the job log and should be burned down deliberately.
version = 2
yanked = "deny"

[bans]
# Warn on duplicate versions of the same crate (bloat + confusion,
# not a security issue by itself). Deny wildcard version requirements
# since they defeat Cargo.lock review.
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
# Everything HARDN links must be compatible with the project MIT
# license and with commercial redistribution of the .deb. Additions
# to this list need a maintainer decision, not a drive-by PR.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
]
confidence-threshold = 0.8

[sources]
# Only crates.io. Git dependencies defeat both Cargo.lock review and
# the advisory database mapping, so they are denied outright; the
# [patch.crates-io] escape hatch in Cargo.toml stays commented out.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
